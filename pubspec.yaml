name: personal_media_archiver
description: "Personal Media Archiver — privacy-first local media archiver for Android."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2802.0
  intl: ^0.20.1
  url_launcher: ^6.3.1
  collection: ^1.18.0
  http_parser: ^4.1.0
  path: ^1.9.0
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true

name: Release APK

# 觸發方式：
#   1. push tag matching v* (e.g. v0.1.0, v0.2.0-rc1)
#      git tag v0.1.0 && git push origin v0.1.0
#   2. 在 GitHub UI 點 Actions → Release APK → Run workflow（手動 dispatch）
#      手動 dispatch 不會建 GitHub Release，只上傳 artifact 供下載驗證
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # 建 GitHub Release 需要

jobs:
  build-and-release:
    name: Build APK + Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (pinned to local)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get dependencies
        run: flutter pub get

      - name: Verify (analyze + test) before build
        run: |
          flutter analyze --no-fatal-infos
          flutter test --reporter expanded

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build universal release APK
        run: flutter build apk --release

      - name: List built APKs (sanity)
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APKs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pma-apks-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PMA ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            # Personal Media Archiver ${{ github.ref_name }}

            ## 安裝方式 / Installation

            **繁中**：下載對應裝置 ABI 的 APK（多數現代 Android 用 `arm64-v8a`），
            傳到手機 → 設定 → 安全性 → 允許未知來源 → 點 APK 安裝。

            **EN**：Download the APK matching your device ABI (most modern Android
            phones use `arm64-v8a`), transfer to your phone → Settings → Security →
            allow unknown sources → tap the APK to install.

            ## APK Variants

            - `app-arm64-v8a-release.apk` — 64-bit ARM（推薦 / recommended，2018+ 裝置）
            - `app-armeabi-v7a-release.apk` — 32-bit ARM（舊裝置）
            - `app-x86_64-release.apk` — x86_64（模擬器或 ChromeOS）
            - `app-release.apk` — universal（包含全部 ABI，檔案最大）

            ## 簽名 / Signing

            這些 APK 用 Flutter debug keystore 簽名 — 適合 sideload 安裝、不能上 Google Play。
            如要 production-signed，需在 repo 設 secrets 後另跑 release pipeline。

            These APKs are signed with Flutter's debug keystore — suitable for
            sideload installation only, not for Google Play distribution.

            ## 注意 / Note

            PMA 為個人媒體歸檔工具，不繞過 DRM / 付費牆。請僅用於保存自己合法擁有
            或公開可存取的內容。詳見 README。

            PMA is a personal media archiver. It does **not** bypass DRM or paywalls.
            Use it only to archive content you legally own or that is publicly accessible.
            See README for details.
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
